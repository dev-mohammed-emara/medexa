[build]
  publish = "dist"
  command = "npm run build"

# Redirect rule to proxy local /api requests to the backend API.
# Replace the placeholder URL with your actual production backend API URL in deployment.
[[redirects]]
  from = "/api/*"
  to = "https://api.example.com/api/v1/:splat"
  status = 200
  force = true


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
